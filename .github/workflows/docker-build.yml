name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        shell: cmd
        run: docker build --platform linux/amd64 --cpu-quota=600000 --memory=8g -t ghcr.io/%IMAGE_NAME%:latest .

      # Push is done manually via SSH due to runner network limitations
      # ssh turbo@192.168.68.102 "docker push ghcr.io/xkenzzo31/dofus-retro-deobfuscator:latest"
