name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        if: github.event_name != 'pull_request'
        shell: cmd
        run: echo ${{ secrets.GITHUB_TOKEN }}| docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        shell: cmd
        run: docker build --platform linux/amd64 -t ghcr.io/%IMAGE_NAME%:latest -t ghcr.io/%IMAGE_NAME%:${{ github.sha }} .

      - name: Push image
        if: github.event_name != 'pull_request'
        shell: cmd
        timeout-minutes: 30
        continue-on-error: true
        run: |
          docker push ghcr.io/%IMAGE_NAME%:latest
          docker push ghcr.io/%IMAGE_NAME%:${{ github.sha }}
