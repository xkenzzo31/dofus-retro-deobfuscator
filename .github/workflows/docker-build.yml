name: Deobfuscate & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deobfuscate:
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker is running
        run: |
          docker info || (echo "Docker not running, attempting restart..." && sudo service docker start && sleep 5 && docker info)

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t dofus-deob .

      - name: Run deobfuscation pipeline
        run: |
          mkdir -p output
          docker run --rm --platform linux/amd64 \
            -v "$(pwd)/output:/output" \
            dofus-deob

      - name: Find output zip
        id: zip
        run: |
          ZIP_FILE=$(ls output/dofus-retro_*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip found, creating one..."
            cd output && zip -r ../dofus-retro-deobfuscated.zip . -x "*.DS_Store" "raw/main.jsc"
            cd ..
            ZIP_FILE="dofus-retro-deobfuscated.zip"
          fi
          echo "zip_path=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zip_path }}
          generate_release_notes: true
          name: "Dofus Retro Deobfuscated — ${{ github.ref_name }}"
          body: |
            Automated deobfuscation of the Dofus Retro client.

            **Contents:**
            - `jsc_decompiled/v2/` — Decompiled JavaScript (raw, valid, webcrack, readable)
            - `resolved/` — Fully resolved JS split by module (shield_crypto, network, auth, electron, zaap, game...)
            - `webcrack_d1el/` — Deobfuscated D1ElectronLauncher.js
            - `report.json` — Resolution statistics (12,816+ wrapper calls resolved)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
